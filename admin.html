<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAccess – Админ панель</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; margin: 0; padding: 24px; color: #0f172a; }
        .container { max-width: 1300px; margin: 0 auto; }
        h1 { font-size: 1.8rem; }
        .card { background: white; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 20px 28px; margin-bottom: 28px; }
        .card h2 { margin-top: 0; font-size: 1.4rem; border-left: 5px solid #3b82f6; padding-left: 16px; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
        .input-group { flex: 1; min-width: 200px; }
        label { display: block; font-weight: 600; font-size: 0.8rem; margin-bottom: 6px; }
        input, button { padding: 10px 14px; border-radius: 14px; border: 1px solid #cbd5e1; font-size: 0.9rem; }
        input { width: 100%; }
        button { background: #3b82f6; color: white; border: none; cursor: pointer; }
        button:hover { background: #2563eb; }
        .status { background: #f1f5f9; padding: 12px; border-radius: 16px; font-family: monospace; margin-top: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔧 EduAccess – Администратор</h1>
    <p>Настройка правил токен-гейтинга, журнал решений, отчёты о справедливости</p>

    <div class="card">
        <h2>⚙️ Настройка правил приоритета</h2>
        <div class="flex-row">
            <div class="input-group"><label>Минимальный баланс FA (wei)</label><input type="text" id="minBalance" placeholder="1000000000000000000"></div>
            <div class="input-group"><label>NFT ID для приоритета (опционально)</label><input type="text" id="requiredNftId" placeholder="1"></div>
            <div class="input-group"><button id="saveRulesBtn">Сохранить правила</button></div>
        </div>
        <div id="rulesStatus" class="status"></div>
    </div>

    <div class="card">
        <h2>📋 Журнал решений (лог токен-гейтинга)</h2>
        <button id="clearJournalBtn">Очистить журнал (в Airtable)</button>
        <div id="journalTable" style="overflow-x: auto; margin-top: 16px;"></div>
    </div>

    <div class="card">
        <h2>📊 Отчёт о справедливости распределения</h2>
        <button id="generateReportBtn">Сформировать отчёт</button>
        <div id="reportDiv" class="status" style="margin-top: 16px;"></div>
    </div>
</div>

<script>
    // Адрес контракта вшит, но не показывается
    const CONTRACT_ADDRESS = '0x5d915a3248beC2579286242d56705698b90b9c5A';
    const AIRTABLE_API_KEY = 'patpZ6jgZUTEW3K1i.af7ec9c8fcb986b62731cf1eeb614ca90a6c98cda8ba03b44e621ff676d1ac57';
    const AIRTABLE_BASE_ID = 'appU61kDaWbBknIqU';
    const RULES_TABLE = 'Rules';
    const JOURNAL_TABLE = 'Journal';

    async function loadRules() {
        const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${RULES_TABLE}?maxRecords=1`;
        const resp = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}` } });
        const data = await resp.json();
        if (data.records && data.records.length > 0) {
            const f = data.records[0].fields;
            return { minBalance: f.minBalance || "1000000000000000000", requiredNftId: f.requiredNftId || "" };
        }
        return { minBalance: "1000000000000000000", requiredNftId: "" };
    }

    async function saveRules(minBalance, requiredNftId) {
        const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${RULES_TABLE}`;
        const existing = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}` } });
        const existingData = await existing.json();
        let recordId = null;
        if (existingData.records && existingData.records.length > 0) recordId = existingData.records[0].id;
        const method = recordId ? 'PATCH' : 'POST';
        const body = {
            records: [{
                id: recordId,
                fields: { minBalance: minBalance, requiredNftId: requiredNftId || "" }
            }]
        };
        await fetch(url, {
            method: method,
            headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
    }

    async function displayJournal() {
        const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${JOURNAL_TABLE}?sort[0][field]=timestamp&sort[0][direction]=desc`;
        const resp = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}` } });
        const data = await resp.json();
        const records = data.records || [];
        if (records.length === 0) {
            document.getElementById('journalTable').innerHTML = '<p>Журнал пуст.</p>';
            return;
        }
        let html = `<table><thead><tr><th>Дата/время</th><th>Студент</th><th>Курс ID</th><th>Доступ</th><th>Причина</th></tr></thead><tbody>`;
        for (let rec of records) {
            const f = rec.fields;
            const studentShort = f.student ? f.student.slice(0,6)+'...'+f.student.slice(-4) : '—';
            html += `<tr>
                <td>${new Date(f.timestamp).toLocaleString()}</td>
                <td>${studentShort}</td>
                <td>${f.courseId || ''}</td>
                <td style="color:${f.granted ? 'green' : 'red'}">${f.granted ? '✅ Разрешён' : '❌ Отказан'}</td>
                <td>${f.reason || ''}</td>
            </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('journalTable').innerHTML = html;
    }

    async function clearJournal() {
        const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${JOURNAL_TABLE}`;
        const resp = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}` } });
        const data = await resp.json();
        for (let rec of (data.records || [])) {
            await fetch(`${url}/${rec.id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}` } });
        }
        displayJournal();
    }

    async function generateReport() {
        const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${JOURNAL_TABLE}`;
        const resp = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}` } });
        const data = await resp.json();
        const records = data.records || [];
        const total = records.length;
        const granted = records.filter(r => r.fields.granted === true).length;
        const denied = total - granted;
        const rules = await loadRules();
        const reportHtml = `
            <strong>📈 Отчёт о справедливости распределения</strong><br>
            • Всего попыток записи: ${total}<br>
            • Удовлетворено (приоритет + оплата): ${granted}<br>
            • Отказано: ${denied}<br>
            • Текущее правило: баланс ≥ ${rules.minBalance} wei ${rules.requiredNftId ? `ИЛИ NFT ID = ${rules.requiredNftId}` : ''}<br>
            • Оценка справедливости: ${denied === 0 ? '✅ Все студенты с приоритетом получили доступ' : '⚠️ Есть отказы — возможно, студентам не хватает токенов/NFT'}
        `;
        document.getElementById('reportDiv').innerHTML = reportHtml;
    }

    document.getElementById('saveRulesBtn').addEventListener('click', async () => {
        const minBalance = document.getElementById('minBalance').value.trim();
        const requiredNftId = document.getElementById('requiredNftId').value.trim();
        if (!minBalance || isNaN(parseInt(minBalance))) {
            document.getElementById('rulesStatus').innerHTML = '❌ Введите корректный баланс';
            return;
        }
        await saveRules(minBalance, requiredNftId);
        document.getElementById('rulesStatus').innerHTML = '✅ Правила сохранены в Airtable!';
        setTimeout(() => document.getElementById('rulesStatus').innerHTML = '', 2000);
        await displayJournal();
    });
    document.getElementById('clearJournalBtn').addEventListener('click', async () => {
        await clearJournal();
        document.getElementById('reportDiv').innerHTML = '';
    });
    document.getElementById('generateReportBtn').addEventListener('click', generateReport);

    (async () => {
        const rules = await loadRules();
        document.getElementById('minBalance').value = rules.minBalance;
        document.getElementById('requiredNftId').value = rules.requiredNftId;
        await displayJournal();
    })();
</script>
</body>
</html>
