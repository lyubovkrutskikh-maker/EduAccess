<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAccess – Администратор</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; margin: 0; padding: 24px; color: #0f172a; }
        .container { max-width: 1300px; margin: 0 auto; }
        h1 { font-size: 1.8rem; }
        .card { background: white; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 20px 28px; margin-bottom: 28px; }
        .card h2 { margin-top: 0; font-size: 1.4rem; border-left: 5px solid #3b82f6; padding-left: 16px; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; margin-bottom: 16px; }
        .input-group { flex: 1; min-width: 200px; }
        label { display: block; font-weight: 600; font-size: 0.8rem; margin-bottom: 6px; }
        input, select, button { padding: 10px 14px; border-radius: 14px; border: 1px solid #cbd5e1; font-size: 0.9rem; }
        input, select { width: 100%; }
        button { background: #3b82f6; color: white; border: none; cursor: pointer; font-weight: 600; }
        button:hover { background: #2563eb; }
        button.danger { background: #ef4444; }
        button.danger:hover { background: #dc2626; }
        button.secondary { background: #6c757d; }
        .status { background: #f1f5f9; padding: 12px; border-radius: 16px; font-family: monospace; margin-top: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔧 EduAccess – Администратор</h1>
    <p>Управление ролями, принудительная деактивация, настройка правил приоритета.</p>

    <div class="card">
        <div class="flex-row">
            <button id="connectBtn">🦊 Подключить кошелёк</button>
            <button id="initBtn" disabled>Инициализировать контракт</button>
        </div>
        <div id="walletStatus" class="status">⚠️ Кошелёк не подключён</div>
        <div id="contractStatus" class="status"></div>
    </div>

    <div class="card" id="adminCard" style="display: none;">
        <h2>👑 Управление ролями учителей</h2>
        <div class="flex-row">
            <div class="input-group"><label>Адрес учителя</label><input type="text" id="teacherAddress" placeholder="0x..."></div>
            <button id="grantTeacherBtn">✅ Назначить учителем</button>
            <button id="revokeTeacherBtn" class="danger">❌ Отозвать роль</button>
        </div>
        <div id="roleStatus" class="status"></div>

        <h2>⚠️ Принудительная деактивация курса</h2>
        <div class="flex-row">
            <div class="input-group"><label>ID курса</label><input type="number" id="forceCourseId" placeholder="1"></div>
            <button id="forceDeactivateBtn" class="danger">Принудительно деактивировать</button>
        </div>

        <h2>⚙️ Настройка правил приоритета (хранятся в контракте)</h2>
        <div class="flex-row">
            <div class="input-group"><label>Минимальный баланс FA (wei)</label><input type="text" id="minBalance" placeholder="1000000000000000000"></div>
            <div class="input-group"><label>ID NFT для приоритета (0 = не использовать)</label><input type="text" id="requiredNftId" placeholder="0"></div>
            <button id="saveRulesBtn">Сохранить правила</button>
        </div>
        <div id="rulesStatus" class="status"></div>
    </div>

    <div class="card" id="txCard" style="display: none;">
        <h2>📋 Последняя транзакция</h2>
        <div id="txHashDisplay" class="mono" style="background:#eef2ff; padding:10px; border-radius:14px;">—</div>
        <div id="txStatus" class="status">—</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
    const CONTRACT_ADDRESS = '0x5eA2488556F0a3F799a321770bad1652d6ec0967';
    let provider, signer, contract, userAddress;

    const adminABI = [
        "function grantTeacher(address)",
        "function revokeTeacher(address)",
        "function forceDeactivate(uint256)",
        "function setMinBalance(uint256)",
        "function setRequiredNftId(uint256)",
        "function minBalance() view returns (uint256)",
        "function requiredNftId() view returns (uint256)",
        "function hasRole(bytes32,address) view returns (bool)",
        "function DEFAULT_ADMIN_ROLE() view returns (bytes32)",
        "function TEACHER_ROLE() view returns (bytes32)"
    ];

    const connectBtn = document.getElementById('connectBtn');
    const initBtn = document.getElementById('initBtn');
    const walletStatusDiv = document.getElementById('walletStatus');
    const contractStatusDiv = document.getElementById('contractStatus');

    async function sendTx(action, params, successMsg, onSuccess) {
        if (!contract) throw new Error('Контракт не инициализирован');
        const txStatusDiv = document.getElementById('txStatus');
        const txHashDisplay = document.getElementById('txHashDisplay');
        txStatusDiv.innerHTML = '⏳ Отправка...';
        txHashDisplay.textContent = 'Ожидание подписи...';
        document.getElementById('txCard').style.display = 'block';
        const tx = await action(...params);
        txHashDisplay.textContent = tx.hash;
        txStatusDiv.innerHTML = `⏳ Отправлена. Ожидание...`;
        const receipt = await tx.wait();
        if (receipt.status === 1) {
            txStatusDiv.innerHTML = `✅ ${successMsg} Блок: ${receipt.blockNumber}`;
            if (onSuccess) await onSuccess(receipt);
            return true;
        } else throw new Error('Транзакция не выполнена');
    }

    connectBtn.onclick = async () => {
        if (!window.ethereum) { walletStatusDiv.innerHTML = '❌ MetaMask не найден'; return; }
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];
            provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            walletStatusDiv.innerHTML = `✅ Подключён: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
            initBtn.disabled = false;
        } catch (err) { walletStatusDiv.innerHTML = `❌ ${err.message}`; }
    };

    initBtn.onclick = async () => {
        if (!provider) { contractStatusDiv.innerHTML = '❌ Сначала подключите кошелёк'; return; }
        try {
            contract = new ethers.Contract(CONTRACT_ADDRESS, adminABI, signer);
            const adminRole = await contract.DEFAULT_ADMIN_ROLE();
            const isAdmin = await contract.hasRole(adminRole, userAddress);
            if (!isAdmin) { contractStatusDiv.innerHTML = '⚠️ У вас нет прав администратора.'; return; }
            contractStatusDiv.innerHTML = '✅ Контракт загружен. Вы администратор.';
            document.getElementById('adminCard').style.display = 'block';
            document.getElementById('txCard').style.display = 'block';
            const minBal = await contract.minBalance();
            const nftId = await contract.requiredNftId();
            document.getElementById('minBalance').value = minBal.toString();
            document.getElementById('requiredNftId').value = nftId.toString();
        } catch (err) { contractStatusDiv.innerHTML = `❌ ${err.message}`; }
    };

    document.getElementById('grantTeacherBtn').onclick = async () => {
        const teacher = document.getElementById('teacherAddress').value.trim();
        if (!ethers.utils.isAddress(teacher)) { document.getElementById('roleStatus').innerHTML = '❌ Некорректный адрес'; return; }
        try {
            await sendTx(contract.grantTeacher, [teacher], `Роль учителя выдана адресу ${teacher}`);
            document.getElementById('roleStatus').innerHTML = `✅ Выдана роль учителя для ${teacher}`;
        } catch (err) { document.getElementById('roleStatus').innerHTML = `❌ ${err.message}`; }
    };
    document.getElementById('revokeTeacherBtn').onclick = async () => {
        const teacher = document.getElementById('teacherAddress').value.trim();
        if (!ethers.utils.isAddress(teacher)) { document.getElementById('roleStatus').innerHTML = '❌ Некорректный адрес'; return; }
        try {
            await sendTx(contract.revokeTeacher, [teacher], `Роль учителя отозвана у ${teacher}`);
            document.getElementById('roleStatus').innerHTML = `✅ Отозвана роль учителя у ${teacher}`;
        } catch (err) { document.getElementById('roleStatus').innerHTML = `❌ ${err.message}`; }
    };
    document.getElementById('forceDeactivateBtn').onclick = async () => {
        const cId = document.getElementById('forceCourseId').value;
        if (!cId) { alert('Введите ID курса'); return; }
        try {
            await sendTx(contract.forceDeactivate, [cId], `Курс ${cId} принудительно деактивирован`);
        } catch (err) { alert(err.message); }
    };
    document.getElementById('saveRulesBtn').onclick = async () => {
        const minBalance = document.getElementById('minBalance').value.trim();
        const requiredNftId = document.getElementById('requiredNftId').value.trim();
        if (!minBalance || isNaN(parseInt(minBalance))) { document.getElementById('rulesStatus').innerHTML = '❌ Введите корректный баланс'; return; }
        try {
            await sendTx(contract.setMinBalance, [minBalance], `Минимальный баланс установлен: ${minBalance}`);
            await sendTx(contract.setRequiredNftId, [requiredNftId || 0], `Требуемый NFT ID установлен: ${requiredNftId || 0}`);
            document.getElementById('rulesStatus').innerHTML = '✅ Правила сохранены в контракте!';
            setTimeout(() => document.getElementById('rulesStatus').innerHTML = '', 3000);
        } catch (err) { document.getElementById('rulesStatus').innerHTML = `❌ ${err.message}`; }
    };
    if (window.ethereum) window.ethereum.on('accountsChanged', () => location.reload());
</script>
</body>
</html>
