<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAccess – Преподаватель</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; margin: 0; padding: 24px; color: #1e293b; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; }
        .card { background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 20px 24px; margin-bottom: 28px; }
        .card h2 { margin-top: 0; border-left: 5px solid #10b981; padding-left: 16px; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
        button { padding: 10px 14px; border-radius: 12px; border: none; font-size: 0.9rem; background: #10b981; color: white; font-weight: 600; cursor: pointer; }
        button:hover { background: #059669; }
        .status { background: #f1f5f9; padding: 12px; border-radius: 16px; font-family: monospace; margin-top: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 EduAccess – Панель преподавателя</h1>
    <p>Просмотр статистики записи на ваши курсы (обычные vs приоритетные студенты)</p>

    <div class="card">
        <div class="flex-row">
            <button id="connectBtn">🦊 Подключить кошелёк</button>
            <button id="initBtn" disabled>📚 Загрузить мои курсы</button>
        </div>
        <div id="walletStatus" class="status">⚠️ Кошелёк не подключён</div>
        <div id="contractStatus" class="status"></div>
    </div>

    <div class="card" id="statsCard" style="display: none;">
        <h2>📈 Статистика по курсам</h2>
        <div id="coursesStats"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
    // Вшитый адрес контракта
    const CONTRACT_ADDRESS = '0x5d915a3248beC2579286242d56705698b90b9c5A';
    const AIRTABLE_API_KEY = 'patpZ6jgZUTEW3K1i.af7ec9c8fcb986b62731cf1eeb614ca90a6c98cda8ba03b44e621ff676d1ac57';
    const AIRTABLE_BASE_ID = 'appU61kDaWbBknIqU';
    const RULES_TABLE = 'Rules';

    let provider, signer, contract, userAddress;

    const connectBtn = document.getElementById('connectBtn');
    const initBtn = document.getElementById('initBtn');
    const walletStatusDiv = document.getElementById('walletStatus');
    const contractStatusDiv = document.getElementById('contractStatus');
    const statsCard = document.getElementById('statsCard');
    const coursesStatsDiv = document.getElementById('coursesStats');

    const teacherABI = [
        "function getTeacherCourses(address teacher) view returns ((uint256 courseId, address teacher, string title, uint256 price, uint256 maxStudents, uint256 enrolled, string metadataURI, bool active)[] list)",
        "function getCourseStudents(uint256 cId) view returns (address[] students, uint256[] faBalances, uint256[] enrollDates)",
        "function getStudentNFTs(address student) view returns (uint256[] tokenIds, uint256[] courseIds, string[] titles, uint256[] enrollDates)",
        "function getFABalance(address student) view returns (uint256)"
    ];

    async function loadRulesFromAirtable() {
        const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${RULES_TABLE}?maxRecords=1`;
        const resp = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}` } });
        const data = await resp.json();
        if (data.records && data.records.length > 0) {
            const f = data.records[0].fields;
            return { minBalance: f.minBalance || "1000000000000000000", requiredNftId: f.requiredNftId || "" };
        }
        return { minBalance: "1000000000000000000", requiredNftId: "" };
    }

    async function loadTeacherStats() {
        if (!contract || !userAddress) return;
        try {
            const courses = await contract.getTeacherCourses(userAddress);
            if (courses.length === 0) { coursesStatsDiv.innerHTML = '<p>У вас пока нет созданных курсов.</p>'; return; }
            const rules = await loadRulesFromAirtable();
            let html = `<table><thead><tr><th>Курс ID</th><th>Название</th><th>Всего записано</th><th>Из них с приоритетом*</th><th>Обычных студентов</th></tr></thead><tbody>`;
            for (let c of courses) {
                const studentsData = await contract.getCourseStudents(c.courseId);
                const students = studentsData[0];
                let priorityCount = 0;
                for (let s of students) {
                    const balance = await contract.getFABalance(s);
                    let hasPriority = balance.gte(ethers.BigNumber.from(rules.minBalance));
                    if (!hasPriority && rules.requiredNftId) {
                        const nfts = await contract.getStudentNFTs(s);
                        if (nfts[0].includes(parseInt(rules.requiredNftId))) hasPriority = true;
                    }
                    if (hasPriority) priorityCount++;
                }
                const normalCount = students.length - priorityCount;
                html += `<tr>
                    <td>${c.courseId}</td>
                    <td>${c.title}</td>
                    <td>${students.length}</td>
                    <td>${priorityCount}</td>
                    <td>${normalCount}</td>
                </tr>`;
            }
            html += `</tbody></table><p><small>* Приоритет определяется по правилам, заданным администратором (баланс FA ≥ порога или наличие NFT).</small></p>`;
            coursesStatsDiv.innerHTML = html;
        } catch (err) {
            coursesStatsDiv.innerHTML = `<p style="color:red;">Ошибка: ${err.message}</p>`;
        }
    }

    connectBtn.onclick = async () => {
        if (!window.ethereum) { walletStatusDiv.innerHTML = '❌ MetaMask не найден'; return; }
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];
            provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            walletStatusDiv.innerHTML = `✅ Подключён: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
            initBtn.disabled = false;
        } catch (err) { walletStatusDiv.innerHTML = `❌ ${err.message}`; }
    };

    initBtn.onclick = async () => {
        if (!provider) { contractStatusDiv.innerHTML = '❌ Сначала подключите кошелёк'; return; }
        try {
            contract = new ethers.Contract(CONTRACT_ADDRESS, teacherABI, signer);
            await contract.getTeacherCourses(userAddress);
            contractStatusDiv.innerHTML = '✅ Контракт загружен. Загружаем курсы...';
            statsCard.style.display = 'block';
            await loadTeacherStats();
        } catch (err) { contractStatusDiv.innerHTML = `❌ ${err.message}`; }
    };

    if (window.ethereum) window.ethereum.on('accountsChanged', () => location.reload());
</script>
</body>
</html>
